# -------------------------------------------------------------------------------------------------
# GitHub Actions Workflow: Publish NuGet Package
#
# Purpose:
#   This workflow builds, tests, and publishes a .NET library to NuGet when a new release is 
#   published and the tag is associated with the main branch.
#
# Prerequisites:
#   - The release tag must follow the format: v<major>.<minor>.<patch> (e.g.,  v1.2.3).
#   - The NuGet API key must be stored in the repository or organization secrets as NUGET_API_KEY.
# -------------------------------------------------------------------------------------------------

name: NuGet Publish

on:
  release:
    types: [published]
    branches:
      - main

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Determine version number
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Error: Manual publish must be triggered on a tag that follows the format v<major>.<minor>.<patch>."
            exit 1
          fi

          RELEASE=${GITHUB_REF_NAME}
          if [[ "$RELEASE" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "Error: Failed to determine version. Ensure the tag follows the format v<major>.<minor>.<patch>."
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./nupkg /p:Version=${{ env.VERSION }}

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
