# -------------------------------------------------------------------------------------------------
# GitHub Actions Workflow: Publish NuGet Package
#
# Purpose:
#   This workflow builds, tests, and publishes a .NET library to NuGet when a new release is 
#   published and the release is associated with the main branch.
#
# Prerequisites:
#   - The .csproj file must contain a valid <Version> element specifying the version of the
#     package.
#   - The NuGet API key must be stored in the repository or organization secrets as NUGET_API_KEY.
# -------------------------------------------------------------------------------------------------

name: NuGet Publish

on:
  release:
    types: [published]

jobs:
  publish:
    if: github.event.release.target_commitish == 'main'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
