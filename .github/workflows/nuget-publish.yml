# -------------------------------------------------------------------------------------------------
# GitHub Actions Workflow: Publish NuGet Package
#
# Purpose:
#   This workflow builds, tests, and publishes a .NET library to NuGet when a new release is 
#   published in the main branch or manually triggered.
#
# Prerequisites:
#   - The release tag must follow the format: v<major>.<minor>.<patch> (e.g.,  v1.2.3).
#   - The NuGet API key must be stored in the repository or organization secrets as NUGET_API_KEY.
# -------------------------------------------------------------------------------------------------

name: NuGet Publish

on:
  release:
    types: [published]

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Get version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            RELEASE=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          else
            RELEASE=${GITHUB_REF_NAME}
          fi

          VERSION=$(echo "$RELEASE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$VERSION" ]; then
            echo "Error: Failed to determine version. Ensure the tag follows the format v<major>.<minor>.<patch>."
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./nupkg /p:Version=${{ env.VERSION }}

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
