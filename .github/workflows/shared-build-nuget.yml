name: Shared NuGet package build (not runnable directly)

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: false
        default: '0.0.1'
        description: 'Version for the NuGet package (optional)'
      packagePath:
        type: string
        required: true
        description: 'Output path for the NuGet package'
      packageName:
        type: string
        required: true
        description: 'Name of the NuGet package'

jobs:
  Build:
    runs-on: ubuntu-latest

    env:
      DOTNET_VERSION: '10.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: dotnet pack --configuration Release --no-restore --output ${{ inputs.packagePath }} /p:Version=${{ inputs.version }}

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.packageName }}
          path: ${{ inputs.packagePath }}/*.nupkg
